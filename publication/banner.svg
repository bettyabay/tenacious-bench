<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="400" fill="url(#accent)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#ffffff08" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#ffffff08" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="400" stroke="#ffffff08" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#f8fafc">Tenacious Judge</text>

  <!-- Subtitle -->
  <text x="62" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#94a3b8">B2B Sales Outreach Pre-Send Judge · ORPO · LoRA</text>

  <!-- Divider -->
  <rect x="60" y="192" width="480" height="3" fill="url(#accent)" rx="2"/>

  <!-- Accuracy badge -->
  <rect x="60" y="218" width="200" height="52" rx="10" fill="#16a34a" opacity="0.9"/>
  <text x="160" y="238" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#dcfce7" text-anchor="middle">Held-out Accuracy</text>
  <text x="160" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">85.2%</text>

  <!-- Training badge -->
  <rect x="276" y="218" width="200" height="52" rx="10" fill="#0ea5e9" opacity="0.9"/>
  <text x="376" y="238" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0f2fe" text-anchor="middle">Training Cost</text>
  <text x="376" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">$0.00</text>

  <!-- Pairs badge -->
  <rect x="492" y="218" width="200" height="52" rx="10" fill="#7c3aed" opacity="0.9"/>
  <text x="592" y="238" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ede9fe" text-anchor="middle">Preference Pairs</text>
  <text x="592" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">323</text>

  <!-- Decision pills right side -->
  <rect x="780" y="80" width="140" height="38" rx="19" fill="#dc2626" opacity="0.85"/>
  <text x="850" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#fff" text-anchor="middle">🚫 SUPPRESS</text>

  <rect x="940" y="80" width="140" height="38" rx="19" fill="#d97706" opacity="0.85"/>
  <text x="1010" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#fff" text-anchor="middle">⬆️ ESCALATE</text>

  <rect x="780" y="134" width="120" height="38" rx="19" fill="#7c3aed" opacity="0.85"/>
  <text x="840" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#fff" text-anchor="middle">🛑 BLOCK</text>

  <rect x="916" y="134" width="140" height="38" rx="19" fill="#ca8a04" opacity="0.85"/>
  <text x="986" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#fff" text-anchor="middle">⚠️ PENALISE</text>

  <rect x="780" y="188" width="110" height="38" rx="19" fill="#16a34a" opacity="0.85"/>
  <text x="835" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#fff" text-anchor="middle">✅ PASS</text>

  <!-- Bottom info -->
  <text x="60" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b">Base model: Qwen2.5-1.5B-Instruct · Method: ORPO · Hardware: Colab T4 · 10 probes · Cohen's κ = 1.000</text>
  <text x="60" y="355" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#475569">bethelhem21/tenacious-judge-lora · bethelhem21/tenacious-bench · 10 Academy TRP1 · 2026</text>
</svg>
