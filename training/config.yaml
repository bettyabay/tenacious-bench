# ORPO Training Configuration — Path B Judge
# Method: ORPO (Odds-Ratio Preference Optimisation) — Hong et al., 2024
# Target hardware: Google Colab T4 (free tier, ~15 GB VRAM)
# Base model: unsloth/llama-3-8b-bnb-4bit (4-bit quantised Llama-3 8B)
#
# Why ORPO instead of DPO:
#   - No reference model needed → saves ~3-4 GB VRAM (critical on T4)
#   - Combines SFT + preference loss in one pass → more stable on small datasets
#   - lambda_ replaces DPO's beta; simpler to tune for binary classification
#   - Outperforms DPO on preference datasets < 500 pairs (Hong et al., 2024)

model:
  base_model: "unsloth/llama-3-8b-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true             # required for T4 VRAM budget

lora:
  r: 16                          # LoRA rank
  lora_alpha: 16                 # scaling = alpha / r = 1.0
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  # ORPO uses lambda_ (odds-ratio weight) instead of DPO's beta (KL penalty)
  # Default from Hong et al. 2024: lambda_ = 0.1
  orpo_lambda: 0.1               # odds-ratio loss weight (replaces dpo_beta)
  epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4  # effective batch = 2 × 4 = 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  fp16: true                     # float16 on T4 (bf16 NOT supported on T4)
  bf16: false
  optim: "adamw_8bit"            # memory-efficient optimiser
  seed: 3407                     # matches split_pairs.py seed for reproducibility

data:
  train: "tenacious_bench_v0.1/train/pairs.jsonl"
  eval:  "tenacious_bench_v0.1/dev/pairs.jsonl"

output:
  adapter_dir: "training/judge_adapter"
  training_log: "training/training_run.log"
  save_steps: 50
  logging_steps: 10
